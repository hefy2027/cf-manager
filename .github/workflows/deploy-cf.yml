name: Deploy to Cloudflare Pages

# 入口工作流 —— 直接输入 Cloudflare 凭据，脱敏后调用 composite action
# 适用于：无 GitHub Environments 配置、手动触发时直接传 Key 的场景

on:
  workflow_dispatch:
    inputs:
      cf_api_key:
        description: 'Cloudflare Global API Key（仅在本脚本内使用，绝不打印到日志）'
        required: true
        type: string
      cf_email:
        description: 'Cloudflare 账号邮箱（仅在本脚本内使用，绝不打印到日志）'
        required: true
        type: string
      project_name:
        description: 'Pages 项目名称'
        required: false
        default: 'cfmgr'
        type: string
      d1_database_name:
        description: 'D1 数据库名称'
        required: false
        default: 'cfmgr'
        type: string
      kv_namespace_name:
        description: 'KV 命名空间名称（用于缓存和粘性路由）'
        required: false
        default: 'cfmgr'
        type: string
      encryption_key:
        description: '加密密钥（用于加密存储 API Token）'
        required: false
        default: 'cfmgrbest'
        type: string
      api_secret:
        description: '访问密码（留空则无需登录）'
        required: false
        default: 'cfmgrbest'
        type: string
      full_wipe:
        description: '完全覆盖：删除并重建 D1 数据库 + 清空 KV 命名空间'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 非交互 CI 下，wrangler 必须通过环境变量认证。
    # 敏感输入绝不能放在 job 级 env —— 否则每个步骤的「env:」头都会把明文打印到日志。
    # 改为第一步就注册脱敏并写入 $GITHUB_ENV，后续步骤一律用 $VAR 引用（日志中均为 ***）。
    steps:
      - name: Mask secrets and export to env
        run: |
          echo "::add-mask::${{ github.event.inputs.cf_api_key }}"
          echo "::add-mask::${{ github.event.inputs.cf_email }}"
          echo "::add-mask::${{ github.event.inputs.encryption_key }}"
          echo "::add-mask::${{ github.event.inputs.api_secret }}"
          echo "CLOUDFLARE_API_KEY=${{ github.event.inputs.cf_api_key }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_EMAIL=${{ github.event.inputs.cf_email }}" >> $GITHUB_ENV
          echo "ENCRYPTION_KEY=${{ github.event.inputs.encryption_key }}" >> $GITHUB_ENV
          echo "API_SECRET=${{ github.event.inputs.api_secret }}" >> $GITHUB_ENV

      - name: Deploy
        uses: ./.github/actions/deploy-cf
        with:
          project_name: ${{ github.event.inputs.project_name }}
          d1_database_name: ${{ github.event.inputs.d1_database_name }}
          kv_namespace_name: ${{ github.event.inputs.kv_namespace_name }}
          full_wipe: ${{ github.event.inputs.full_wipe }}
