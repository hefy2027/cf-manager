name: Deploy to Cloudflare Pages (Secrets)

# 入口工作流 —— 通过 GitHub Environments 读取预配置的 Secrets，调用 composite action
# 适用于：已配置 GitHub Environment（含 CF_API_KEY / CF_EMAIL / ENCRYPTION_KEY / API_SECRET）
#
# 需要在 GitHub 仓库 Settings → Environments 中创建对应 environment，并配置以下 secrets：
#   CF_API_KEY       — Cloudflare Global API Key
#   CF_EMAIL         — Cloudflare 账号邮箱
#   ENCRYPTION_KEY   — 加密密钥（用于加密存储 API Token）
#   API_SECRET       — 访问密码（可选）

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署目标（输入 GitHub Environment 名称，如 production）'
        required: true
        type: string
        default: 'production'
      project_name:
        description: 'Pages 项目名称'
        required: false
        default: 'cfmgr'
        type: string
      d1_database_name:
        description: 'D1 数据库名称'
        required: false
        default: 'cfmgr'
        type: string
      kv_namespace_name:
        description: 'KV 命名空间名称'
        required: false
        default: 'cfmgr'
        type: string
      full_wipe:
        description: '完全覆盖：删除并重建 D1 + KV'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 使用 GitHub Environments 锁定部署目标：
    # 每个 environment 下配置独立的 CF_API_KEY / CF_EMAIL 等 secret，
    # 部署时通过下拉选择 environment，敏感信息全程脱敏。
    environment: ${{ github.event.inputs.environment }}
    env:
      CLOUDFLARE_API_KEY: ${{ secrets.CF_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}

    steps:
      # checkout 必须在调用本地 composite action 之前执行，否则 runner 找不到 action.yml
      - uses: actions/checkout@v5

      - name: Deploy
        uses: ./.github/actions/deploy-cf
        with:
          project_name: ${{ github.event.inputs.project_name }}
          d1_database_name: ${{ github.event.inputs.d1_database_name }}
          kv_namespace_name: ${{ github.event.inputs.kv_namespace_name }}
          full_wipe: ${{ github.event.inputs.full_wipe }}
