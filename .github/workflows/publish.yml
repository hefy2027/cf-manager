name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)；若该 tag 已存在则覆盖对应 Release，留空则从 master 自动递增 patch'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Determine version
        id: version
        run: |
          TAG_EXISTS=false
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            # 使用输入原值，不做任何前缀规范化
            # 检测该 tag 是否已存在
            if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
              TAG_EXISTS=true
              echo "输入的 tag ${VERSION} 已存在，将 checkout 到该 tag 覆盖对应 Release"
            else
              echo "输入的 tag ${VERSION} 不存在，将从 master 重新打包并创建新 tag"
            fi
          else
            # 留空：从最新 tag 自动递增 patch，使用 master 代码打新 tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Checkout tag if it already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          git checkout "${{ steps.version.outputs.tag }}"
          echo "已切换到已有 tag: ${{ steps.version.outputs.tag }}"

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Build and package
        working-directory: worker
        run: node build.js

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          PLAIN_VERSION="${VERSION#v}"
          TARGET_HEADER="## [${PLAIN_VERSION}]"
          if [ -f CHANGELOG.md ]; then
            # 使用 index() 固定字符串匹配，避免正则转义问题
            awk -v target="$TARGET_HEADER" '
              BEGIN { found=0 }
              index($0, target) > 0 && !found { found=1; next }
              found && index($0, "## [") == 1 { exit }
              found { print }
            ' CHANGELOG.md > /tmp/release_body.md
          fi
          if [ -s /tmp/release_body.md ]; then
            echo "has_changelog=true" >> $GITHUB_OUTPUT
            echo "--- Changelog preview (first 200 chars) ---"
            head -c 200 /tmp/release_body.md
            echo ""
            echo "--- End preview ---"
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            echo "WARNING: No changelog extracted for version ${PLAIN_VERSION}"
            echo "CHANGELOG headers found:"
            grep "^## \[" CHANGELOG.md || echo "  (none)"
          fi

      - name: Create Release (from CHANGELOG.md)
        if: steps.changelog.outputs.has_changelog == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
          files: worker/cf-manager.zip

      - name: Create Release (auto-generated)
        if: steps.changelog.outputs.has_changelog != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: worker/cf-manager.zip

      - name: Publish summary
        if: always()
        run: |
          echo "## 发布完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本号 | ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.tag_exists == 'true' && '覆盖已有 Release' || '新建 Release' }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Release 地址 | https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 附件 | cf-manager.zip (Worker 预编译包) |" >> $GITHUB_STEP_SUMMARY
          echo "| CHANGELOG | ${{ steps.changelog.outputs.has_changelog == 'true' && '✅ 已包含' || '⚠️ 自动生成' }} |" >> $GITHUB_STEP_SUMMARY
